<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>0xSaad - المدونة - 0xSaad</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Cairo', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f9f9f9;
    }

    .site-header {
      background-color: #2c3e50;
      padding: 20px;
      color: white;
    }

    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1000px;
      margin: 0 auto;
    }

    .main-nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
      padding: 0;
      margin: 0;
    }

    .main-nav a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    .main-nav .active {
      border-bottom: 2px solid #f1c40f;
    }

    main {
      max-width: 1000px;
      margin: auto;
      padding: 30px 20px;
    }

    h1 {
      text-align: center;
      color: #2c3e50;
    }

    .posts-container {
      display: grid;
      gap: 20px;
    }

    .post {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .post h2 {
      margin: 0;
      font-size: 20px;
      color: #333;
    }

    .post p {
      color: #555;
    }

    .post a {
      display: inline-block;
      margin-top: 10px;
      color: #2980b9;
      text-decoration: none;
    }

    .post a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-content">
      <h1 class="site-title">0xSaad</h1>
      <nav class="main-nav">
        <ul>
          <li><a href="index.html" class="nav-link">الرئيسية</a></li>
          <li><a href="blog.html" class="nav-link active">المدونة</a></li>
          <li><a href="about.html" class="nav-link">عني</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <h1>مقالاتي من المدونة</h1>
    <div class="posts-container">
      
    </div>
  </main>
</body>
</html>
